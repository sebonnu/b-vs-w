<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>白黒対戦シューティング - 爆速オンライン最新版</title>
<script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
<style>
    body {
        margin: 0;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        background-color: #555;
        overflow: hidden;
        font-family: sans-serif;
        color: white;
    }
    #gameContainer {
        text-align: center;
        position: relative; 
    }
    canvas {
        border: 4px solid #222;
        box-shadow: 0 0 20px rgba(0,0,0,0.8);
        display: none; 
        background-color: #333; 
    }
    /* ロビー画面のスタイル */
    #lobby {
        width: 800px;
        height: 600px;
        background-color: #333;
        border: 4px solid #222;
        box-shadow: 0 0 20px rgba(0,0,0,0.8);
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        box-sizing: border-box;
    }
    .lobby-box {
        background-color: #444;
        padding: 15px;
        border-radius: 8px;
        margin: 15px;
        width: 80%;
    }
    input {
        padding: 8px;
        font-size: 16px;
        width: 50%;
        margin-right: 10px;
    }
    .btn {
        padding: 10px 20px;
        font-size: 16px;
        font-weight: bold;
        background-color: #00FF33;
        color: #000;
        border: none;
        border-radius: 5px;
        cursor: pointer;
    }
    .btn:hover { background-color: #00CC22; }

    #stageSelect {
        width: 800px;
        height: 600px;
        background-color: #333;
        border: 4px solid #222;
        box-shadow: 0 0 20px rgba(0,0,0,0.8);
        display: none; 
        flex-direction: column;
        justify-content: center;
        align-items: center;
        box-sizing: border-box;
    }
    #stageSelect h1 {
        margin-bottom: 40px;
        font-size: 36px;
        letter-spacing: 2px;
    }
    .button-container {
        display: flex;
        gap: 20px;
    }
    .stage-btn {
        width: 190px;
        padding: 20px;
        font-size: 16px;
        font-weight: bold;
        background-color: #444;
        color: white;
        border: 2px solid #666;
        border-radius: 8px;
        cursor: pointer;
        transition: all 0.2s;
    }
    .stage-btn:hover:not(:disabled) {
        background-color: #FF3333;
        border-color: #FFF;
        transform: scale(1.05);
    }
    .notice {
        margin-top: 10px;
        font-size: 14px;
        color: #ccc;
    }
    #countdown {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        font-size: 120px; 
        font-weight: bold;
        color: #FF3333; 
        pointer-events: none; 
        display: none; 
        z-index: 10; 
    }
</style>
</head>
<body>

<div id="gameContainer">
    <div id="lobby">
        <h2>🌐 オンラインマッチング</h2>
        <div class="lobby-box">
            <h3>1. 部屋を作る（ホスト：黒プレイヤー）</h3>
            <button class="btn" onclick="initHost()">部屋を建てる</button>
            <p id="hostIdDisplay" style="font-weight:bold; color:#00FF33; margin-top:10px; font-size:18px; letter-spacing:1px;"></p>
        </div>
        <div class="lobby-box">
            <h3>2. 部屋に入る（ゲスト：白プレイヤー）</h3>
            <input type="text" id="joinIdInput" placeholder="ホストのIDを入力">
            <button class="btn" onclick="initGuest()">参戦する</button>
        </div>
        <p id="statusText" style="color:#aaa;">接続を待機中...</p>
    </div>

    <div id="stageSelect">
        <h1>STAGE SELECT</h1>
        <p id="stageSelectNotice" style="color:#FF8888; font-weight:bold; margin-bottom:20px;"></p>
        <div class="button-container">
            <button class="stage-btn" id="btnStage1" onclick="selectStage('arena')">1. 凸凹アリーナ<br><span style="font-size:12px; font-weight:normal; color:#aaa;">四角を組み合わせた<br>中央が広い変形マップ</span></button>
            <button class="stage-btn" id="btnStage2" onclick="selectStage('pillars')">2. 四大巨柱<br><span style="font-size:12px; font-weight:normal; color:#aaa;">十字の空間と<br>巨大な4つの壁ブロック</span></button>
            <button class="stage-btn" id="btnStage3" onclick="selectStage('labyrinth')">3. クランク回廊<br><span style="font-size:12px; font-weight:normal; color:#aaa;">角を切り落とした<br>入り組んだバトルエリア</span></button>
        </div>
    </div>

    <canvas id="gameCanvas" width="800" height="600"></canvas>
    <div id="countdown"></div>
    <div class="notice">
        【自分（黒）】移動: WASD / 射撃: Q (2秒長押しチャージ) ※ホストのみ<br>
        【自分（白）】移動: 矢印キー / 射撃: Enter (2秒長押しチャージ) ※ゲストのみ
    </div>
</div>

<script>
// --- 通信システム用変数 ---
let peer = null;
let conn = null;
let isHost = false; 

// --- ゲームコア変数 ---
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const countdownEl = document.getElementById('countdown');
const stageSelectEl = document.getElementById('stageSelect');
const lobbyEl = document.getElementById('lobby');
const statusText = document.getElementById('statusText');

const GRID_SIZE = 40; 
const COLS = canvas.width / GRID_SIZE;  
const ROWS = canvas.height / GRID_SIZE; 

let grid = new Uint8Array(COLS * ROWS);
let currentStageType = 'arena'; 

// --- ネットワーク初期化 ---
function initHost() {
    isHost = true;
    peer = new Peer();
    statusText.textContent = "IDを発行中...";
    peer.on('open', (id) => {
        document.getElementById('hostIdDisplay').textContent = "部屋ID: " + id;
        statusText.textContent = "友達にIDをコピーして送ってください。待機中...";
    });
    peer.on('connection', (connection) => {
        conn = connection;
        setupNetworkEvents();
    });
}

function initGuest() {
    isHost = false;
    const targetId = document.getElementById('joinIdInput').value.trim();
    if (!targetId) { alert("IDを入力してください！"); return; }
    peer = new Peer();
    statusText.textContent = "ホストに接続中...";
    peer.on('open', () => {
        conn = peer.connect(targetId);
        setupNetworkEvents();
    });
}

function setupNetworkEvents() {
    conn.on('open', () => {
        statusText.textContent = "接続が完了しました！画面を切り替えます...";
        setTimeout(() => {
            lobbyEl.style.display = 'none';
            stageSelectEl.style.display = 'flex';
            if (!isHost) {
                document.getElementById('btnStage1').disabled = true;
                document.getElementById('btnStage2').disabled = true;
                document.getElementById('btnStage3').disabled = true;
                document.getElementById('stageSelectNotice').textContent = "ホストがステージを選んでいます。しばらくお待ちください...";
            } else {
                document.getElementById('stageSelectNotice').textContent = "お好きなステージを選んでゲームを開始してください！";
            }
        }, 1000);
    });

    conn.on('data', (data) => {
        if (isHost) {
            // ホスト側：ゲストのキー入力を同期
            if (data.type === 'keys') { keysDown = data.keys; }
        } else {
            // ゲスト側：ホストからの同期描画データを受信
            if (data.type === 'sync') {
                renderGameAsGuest(data);
            } else if (data.type === 'stageSelect') {
                stageSelectEl.style.display = 'none';
                canvas.style.display = 'block';
            }
        }
    });
}

// --- ゲスト側専用：ホストからのデータを描画するだけの処理 ---
function renderGameAsGuest(data) {
    canvas.style.display = 'block';
    stageSelectEl.style.display = 'none';
    
    if (data.gameOver) {
        ctx.fillStyle = 'rgba(128, 128, 128, 0.85)'; ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = '#FFF'; ctx.strokeStyle = '#000'; ctx.lineWidth = 4; ctx.font = 'bold 48px sans-serif'; ctx.textAlign = 'center';
        ctx.strokeText(data.winner, canvas.width / 2, canvas.height / 2); ctx.fillText(data.winner, canvas.width / 2, canvas.height / 2);
        return;
    }

    if (data.countdown > 0) {
        countdownEl.style.display = 'block'; countdownEl.textContent = data.countdown;
    } else {
        countdownEl.style.display = 'none';
    }

    ctx.clearRect(0, 0, canvas.width, canvas.height);

    // マス（グリッド）描画
    const sharedGrid = new Uint8Array(data.grid);
    for (let r = 0; r < ROWS; r++) {
        for (let c = 0; c < COLS; c++) {
            const val = sharedGrid[r * COLS + c];
            if (val === 9) {
                ctx.fillStyle = '#666'; ctx.fillRect(c * GRID_SIZE, r * GRID_SIZE, GRID_SIZE, GRID_SIZE);
                ctx.strokeStyle = '#444'; ctx.lineWidth = 2; ctx.strokeRect(c * GRID_SIZE + 2, r * GRID_SIZE + 2, GRID_SIZE - 4, GRID_SIZE - 4);
            } else {
                ctx.fillStyle = (val === 1) ? '#000' : '#FFF'; ctx.fillRect(c * GRID_SIZE, r * GRID_SIZE, GRID_SIZE, GRID_SIZE);
                ctx.strokeStyle = 'rgba(128, 128, 128, 0.2)'; ctx.lineWidth = 1; ctx.strokeRect(c * GRID_SIZE, r * GRID_SIZE, GRID_SIZE, GRID_SIZE);
            }
        }
    }

    // アイテム描画
    for (let item of data.items) {
        ctx.fillStyle = '#FF3333'; ctx.strokeStyle = '#FFF'; ctx.lineWidth = 3;
        ctx.fillRect(item.x * GRID_SIZE + 8, item.y * GRID_SIZE + 8, GRID_SIZE - 16, GRID_SIZE - 16);
        ctx.strokeRect(item.x * GRID_SIZE + 8, item.y * GRID_SIZE + 8, GRID_SIZE - 16, GRID_SIZE - 16);
    }

    // 弾描画
    for (let b of data.bullets) {
        ctx.fillStyle = b.color; ctx.strokeStyle = '#FFF'; ctx.lineWidth = 2;
        ctx.fillRect(b.x, b.y, GRID_SIZE, GRID_SIZE); ctx.strokeRect(b.x, b.y, GRID_SIZE, GRID_SIZE);
    }
    
    // P1・P2を簡易描画
    const drawPlayerProxy = (p, isP1) => {
        ctx.fillStyle = p.charging ? '#00FF33' : (isP1 ? '#000' : '#FFF');
        ctx.strokeStyle = p.hasPower ? '#FF3333' : (isP1 ? '#FFF' : '#000');
        ctx.lineWidth = 3;
        ctx.fillRect(p.x * GRID_SIZE, p.y * GRID_SIZE, GRID_SIZE, GRID_SIZE);
        ctx.strokeRect(p.x * GRID_SIZE, p.y * GRID_SIZE, GRID_SIZE, GRID_SIZE);

        ctx.fillStyle = p.charging ? '#000' : (isP1 ? '#FFF' : '#000');
        ctx.font = 'bold 14px sans-serif'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
        ctx.fillText(p.ammo, p.x * GRID_SIZE + GRID_SIZE/2, p.y * GRID_SIZE + GRID_SIZE/2);
    };

    drawPlayerProxy(data.p1, true);
    drawPlayerProxy(data.p2, false);
}

// --- ロジック・ステージ構築 ---
function initGrid(stageType) {
    grid.fill(9); 
    for (let y = 0; y < ROWS; y++) {
        for (let x = 0; x < COLS; x++) {
            if (stageType === 'arena') {
                let isInside = true;
                if ((x < 3 || x >= COLS - 3) && (y < 3 || y >= ROWS - 3)) isInside = false; 
                if (isInside) grid[y * COLS + x] = (x >= COLS / 2) ? 1 : 0;
            } else if (stageType === 'pillars') {
                grid[y * COLS + x] = (x >= COLS / 2) ? 1 : 0;
                if ((x === 4 || x === 5 || x === 14 || x === 15) && (y === 3 || y === 4 || y === 10 || y === 11)) {
                    grid[y * COLS + x] = 9;
                }
            } else if (stageType === 'labyrinth') {
                let isInside = true;
                if (x + y < 5) isInside = false;
                if ((COLS - 1 - x) + y < 5) isInside = false;
                if (x + (ROWS - 1 - y) < 5) isInside = false;
                if ((COLS - 1 - x) + (ROWS - 1 - y) < 5) isInside = false;
                if ((x === 9 || x === 10) && (y >= 4 && y <= 10)) isInside = false;
                if (isInside) grid[y * COLS + x] = (x % 2 === 0) ? 0 : 1;
            }
        }
    }
}

// --- クラス定義群（ホストの計算用） ---
class Player {
    constructor(id, gridX, gridY, isBlack) {
        this.id = id; this.gridX = gridX; this.gridY = gridY;
        this.size = GRID_SIZE; this.isBlack = isBlack;
        this.moveColor = isBlack ? 0 : 1; this.ammo = 5;
        this.lastShotTime = 0; this.lastAmmoRecoverTime = Date.now();
        this.lastMoveTime = 0; this.moveCooldown = 120; this.hasPowerShot = false;
        this.dirX = id === 1 ? 1 : -1; this.dirY = 0;
        this.shootPressedStartTime = 0; this.isCharging = false; this.shootKeyLastState = false; 
        
        if (id === 1) {
            this.keys = { u: 'w', d: 's', l: 'a', r: 'd' }; this.shootKey = 'q';
        } else {
            this.keys = { u: 'arrowup', d: 'arrowdown', l: 'arrowleft', r: 'arrowright' }; this.shootKey = 'enter';
        }
    }

    update(keysDown, bullets) {
        const now = Date.now();
        if (this.ammo < 5 && now - this.lastAmmoRecoverTime >= 2000) { this.ammo++; this.lastAmmoRecoverTime = now; }

        if (now - this.lastMoveTime > this.moveCooldown) {
            let nextX = this.gridX; let nextY = this.gridY; let moved = false;
            let newDirX = 0; let newDirY = 0;
            if (keysDown[this.keys.u]) { nextY--; newDirY = -1; moved = true; }
            else if (keysDown[this.keys.d]) { nextY++; newDirY = 1; moved = true; }
            else if (keysDown[this.keys.l]) { nextX--; newDirX = -1; moved = true; }
            else if (keysDown[this.keys.r]) { nextX++; newDirX = 1; moved = true; }

            if (moved) {
                this.dirX = newDirX; this.dirY = newDirY;
                if (nextX >= 0 && nextX < COLS && nextY >= 0 && nextY < ROWS) {
                    if (grid[nextY * COLS + nextX] === this.moveColor) {
                        this.gridX = nextX; this.gridY = nextY; this.lastMoveTime = now;
                    }
                }
            }
        }

        const isShootKeyDown = !!keysDown[this.shootKey];
        if (isShootKeyDown && !this.shootKeyLastState) { this.shootPressedStartTime = now; this.isCharging = false; }
        if (isShootKeyDown) {
            if (now - this.shootPressedStartTime >= 2000 && this.ammo >= 3) { this.isCharging = true; }
        } else if (!isShootKeyDown && this.shootKeyLastState) {
            if (this.isCharging && this.ammo >= 3 && now - this.lastShotTime > 150) {
                this.ammo -= 3; this.lastShotTime = now;
                if (this.ammo <= 4) this.lastAmmoRecoverTime = now;
                this.fire3ParallelLines(bullets); this.hasPowerShot = false; 
            } else if (this.ammo > 0 && now - this.lastShotTime > 150) {
                this.ammo--; this.lastShotTime = now;
                if (this.ammo === 4) this.lastAmmoRecoverTime = now; 
                bullets.push(new Bullet(this.gridX * GRID_SIZE, this.gridY * GRID_SIZE, this.dirX, this.dirY, this.isBlack, this.hasPowerShot, false));
                this.hasPowerShot = false;
            }
            this.isCharging = false;
        }
        this.shootKeyLastState = isShootKeyDown;
    }

    fire3ParallelLines(bullets) {
        const currentX = this.gridX * GRID_SIZE; const currentY = this.gridY * GRID_SIZE;
        bullets.push(new Bullet(currentX, currentY, this.dirX, this.dirY, this.isBlack, false, true));
        if (this.dirX !== 0 && this.dirY === 0) {
            bullets.push(new Bullet(currentX, currentY - GRID_SIZE, this.dirX, this.dirY, this.isBlack, false, true));
            bullets.push(new Bullet(currentX, currentY + GRID_SIZE, this.dirX, this.dirY, this.isBlack, false, true));
        } else if (this.dirY !== 0 && this.dirX === 0) {
            bullets.push(new Bullet(currentX - GRID_SIZE, currentY, this.dirX, this.dirY, this.isBlack, false, true));
            bullets.push(new Bullet(currentX + GRID_SIZE, currentY, this.dirX, this.dirY, this.isBlack, false, true));
        }
    }

    draw(ctx) {
        const px = this.gridX * GRID_SIZE; const py = this.gridY * GRID_SIZE;
        ctx.fillStyle = this.isCharging ? '#00FF33' : (this.isBlack ? '#000' : '#FFF');
        ctx.strokeStyle = this.hasPowerShot ? '#FF3333' : (this.isBlack ? '#FFF' : '#000');
        ctx.lineWidth = (this.hasPowerShot || this.isCharging) ? 4 : 3;
        ctx.fillRect(px, py, this.size, this.size); ctx.strokeRect(px, py, this.size, this.size);

        // 簡易向き矢印描画
        ctx.fillStyle = this.isCharging ? '#00FF33' : (this.isBlack ? '#000' : '#FFF');
        ctx.strokeStyle = this.hasPowerShot ? '#FF3333' : (this.isBlack ? '#FFF' : '#000');
        ctx.lineWidth = 1; ctx.beginPath();
        const mSize = 8; const gap = 4; const cx = px + this.size / 2; const cy = py + this.size / 2;
        if (this.dirX > 0) { ctx.moveTo(px + this.size + gap, cy); ctx.lineTo(px + this.size + gap - mSize, cy - mSize); ctx.lineTo(px + this.size + gap - mSize, cy + mSize); }
        else if (this.dirX < 0) { ctx.moveTo(px - gap, cy); ctx.lineTo(px - gap + mSize, cy - mSize); ctx.lineTo(px - gap + mSize, cy + mSize); }
        else if (this.dirY < 0) { ctx.moveTo(cx, py - gap); ctx.lineTo(cx - mSize, py - gap + mSize); ctx.lineTo(cx + mSize, py - gap + mSize); }
        else if (this.dirY > 0) { ctx.moveTo(cx, py + this.size + gap); ctx.lineTo(cx - mSize, py + this.size + gap - mSize); ctx.lineTo(cx + mSize, py + this.size + gap - mSize); }
        ctx.closePath(); ctx.fill(); ctx.stroke();

        ctx.fillStyle = this.isCharging ? '#000' : (this.isBlack ? '#FFF' : '#000');
        ctx.font = 'bold 14px sans-serif'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
        ctx.fillText(this.ammo, cx, cy);
    }
}

class Bullet {
    constructor(x, y, dirX, dirY, isBlackPlayer, isPower = false, isGreen3Way = false) {
        this.x = x; this.y = y; this.dirX = dirX; this.dirY = dirY;
        this.isPower = isPower; this.isGreen3Way = isGreen3Way; 
        this.speed = isPower ? 24 : 12; this.size = GRID_SIZE;
        this.isBlack = isBlackPlayer; this.paintColor = isBlackPlayer ? 0 : 1;
        this.toRemove = false; this.hitSize = 16;
    }
    getHitRect() { const offset = (this.size - this.hitSize) / 2; return { x: this.x + offset, y: this.y + offset, size: this.hitSize }; }
    update() {
        this.x += this.dirX * this.speed; this.y += this.dirY * this.speed;
        const cx = this.x + this.size / 2; const cy = this.y + this.size / 2;
        const gc = Math.floor(cx / GRID_SIZE); const gr = Math.floor(cy / GRID_SIZE);
        if (gc >= 0 && gc < COLS && gr >= 0 && gr < ROWS) {
            if (grid[gr * COLS + gc] === 9) this.toRemove = true;
            else grid[gr * COLS + gc] = this.paintColor;
        } else { this.toRemove = true; }
    }
    draw(ctx) {
        if (this.toRemove) return;
        ctx.fillStyle = this.isGreen3Way ? '#00FF33' : (this.isPower ? '#FF3333' : (this.isBlack ? '#000' : '#FFF'));
        ctx.strokeStyle = this.isBlack ? '#FFF' : '#000'; ctx.lineWidth = 2;
        ctx.fillRect(this.x, this.y, this.size, this.size); ctx.strokeRect(this.x, this.y, this.size, this.size);
    }
}

class Item {
    constructor() {
        let valid = false;
        while (!valid) {
            this.gridX = Math.floor(Math.random() * COLS); this.gridY = Math.floor(Math.random() * ROWS);
            if (grid[this.gridY * COLS + this.gridX] !== 9) valid = true;
        }
        this.size = GRID_SIZE;
    }
    draw(ctx) {
        const px = this.gridX * GRID_SIZE; const py = this.gridY * GRID_SIZE;
        ctx.fillStyle = '#FF3333'; ctx.strokeStyle = '#FFF'; ctx.lineWidth = 3;
        ctx.fillRect(px + 8, py + 8, this.size - 16, this.size - 16); ctx.strokeRect(px + 8, py + 8, this.size - 16, this.size - 16);
    }
}

// --- 入力処理管理 ---
let keysDown = {};
const preventDefaultKeys = ['w','a','s','d','q','arrowup','arrowdown','arrowleft','arrowright','enter'];

window.addEventListener('keydown', e => {
    const key = e.key.toLowerCase(); keysDown[key] = true;
    if (preventDefaultKeys.includes(key)) e.preventDefault();
    if (!isHost && conn) conn.send({ type: 'keys', keys: keysDown }); // ゲストは入力を即送信
});

window.addEventListener('keyup', e => {
    keysDown[e.key.toLowerCase()] = false;
    if (!isHost && conn) conn.send({ type: 'keys', keys: keysDown });
});

// --- メインループ（ホスト側だけが実体として動かす） ---
let p1, p2, bullets, items, gameOver = false, winner = '', currentCount = 0, lastItemSpawnTime = 0;

function selectStage(stageType) {
    if (!isHost) return; 
    currentStageType = stageType;
    stageSelectEl.style.display = 'none'; canvas.style.display = 'block';      
    conn.send({ type: 'stageSelect', stage: stageType }); 
    startGame();
}

function startGame() {
    initGrid(currentStageType); 
    let p1X, p1Y, p2X, p2Y;
    if (currentStageType === 'arena') { p1X = 4; p1Y = 7; p2X = 15; p2Y = 7; }
    else if (currentStageType === 'pillars') { p1X = 2; p1Y = 7; p2X = 17; p2Y = 7; }
    else { p1X = 2; p1Y = 12; p2X = 17; p2Y = 2; }

    grid[p1Y * COLS + p1X] = 0; grid[p2Y * COLS + p2X] = 1; 
    p1 = new Player(1, p1X, p1Y, true); p2 = new Player(2, p2X, p2Y, false);
    bullets = []; items = []; gameOver = false; winner = '';
    lastItemSpawnTime = Date.now(); 

    currentCount = 3; countdownEl.style.display = 'block'; countdownEl.textContent = currentCount;
    let timer = setInterval(() => {
        currentCount--;
        if (currentCount > 0) { countdownEl.textContent = currentCount; }
        else { clearInterval(timer); countdownEl.style.display = 'none'; }
    }, 1000);

    requestAnimationFrame(loop); 
}

function loop() {
    if (!isHost) return; 

    if (!gameOver && currentCount <= 0) { 
        p1.update(keysDown, bullets);
        p2.update(keysDown, bullets);

        const now = Date.now();
        if (items.length < 2 && (now - lastItemSpawnTime > 5000)) {
            if (Math.random() < 0.003) { items.push(new Item()); lastItemSpawnTime = now; }
        }

        for (let i = bullets.length - 1; i >= 0; i--) {
            let b = bullets[i]; b.update();
            if (b.toRemove) bullets.splice(i, 1);
        }
        
        // 相殺判定
        for (let i = 0; i < bullets.length; i++) {
            for (let j = i + 1; j < bullets.length; j++) {
                if (bullets[i].isBlack !== bullets[j].isBlack) {
                    const r1 = bullets[i].getHitRect(); const r2 = bullets[j].getHitRect();
                    if (!(r2.x > r1.x + r1.size || r2.x + r2.size < r1.x || r2.y > r1.y + r1.size || r2.y + r2.size < r1.y)) {
                        bullets[i].toRemove = true; bullets[j].toRemove = true;
                    }
                }
            }
        }

        // 被弾判定
        const p1x = p1.gridX * GRID_SIZE; const p1y = p1.gridY * GRID_SIZE;
        const p2x = p2.gridX * GRID_SIZE; const p2y = p2.gridY * GRID_SIZE;
        for (let b of bullets) {
            if (b.toRemove) continue;
            const br = b.getHitRect();
            if (!b.isBlack && !(br.x > p1x + GRID_SIZE || br.x + br.size < p1x || br.y > p1y + GRID_SIZE || br.y + br.size < p1y)) {
                gameOver = true; winner = 'プレイヤー2 (白) の勝利！';
            }
            if (b.isBlack && !(br.x > p2x + GRID_SIZE || br.x + br.size < p2x || br.y > p2y + GRID_SIZE || br.y + br.size < p2y)) {
                gameOver = true; winner = 'プレイヤー1 (黒) の勝利！';
            }
        }

        // アイテム取得
        for (let i = items.length - 1; i >= 0; i--) {
            if (p1.gridX === items[i].gridX && p1.gridY === items[i].gridY) { p1.hasPowerShot = true; items.splice(i, 1); }
            else if (p2.gridX === items[i].gridX && p2.gridY === items[i].gridY) { p2.hasPowerShot = true; items.splice(i, 1); }
        }
    }

    // ホスト側の画面描画
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    for (let r = 0; r < ROWS; r++) {
        for (let c = 0; c < COLS; c++) {
            const val = grid[r * COLS + c];
            if (val === 9) {
                ctx.fillStyle = '#666'; ctx.fillRect(c * GRID_SIZE, r * GRID_SIZE, GRID_SIZE, GRID_SIZE);
                ctx.strokeStyle = '#444'; ctx.lineWidth = 2; ctx.strokeRect(c * GRID_SIZE + 2, r * GRID_SIZE + 2, GRID_SIZE - 4, GRID_SIZE - 4);
            } else {
                ctx.fillStyle = (val === 1) ? '#000' : '#FFF'; ctx.fillRect(c * GRID_SIZE, r * GRID_SIZE, GRID_SIZE, GRID_SIZE);
                ctx.strokeStyle = 'rgba(128, 128, 128, 0.2)'; ctx.lineWidth = 1; ctx.strokeRect(c * GRID_SIZE, r * GRID_SIZE, GRID_SIZE, GRID_SIZE);
            }
        }
    }
    for (let item of items) item.draw(ctx);
    for (let b of bullets) b.draw(ctx);
    p1.draw(ctx); p2.draw(ctx);
    if (gameOver) {
        ctx.fillStyle = 'rgba(128, 128, 128, 0.85)'; ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = '#FFF'; ctx.font = 'bold 48px sans-serif'; ctx.textAlign = 'center';
        ctx.fillText(winner, canvas.width / 2, canvas.height / 2);
    }

    // ゲストに最新データを一括送信して同期
    if (conn) {
        const bulletData = bullets.map(b => ({ x: b.x, y: b.y, color: b.isGreen3Way ? '#00FF33' : (b.isPower ? '#FF3333' : (b.isBlack ? '#000' : '#FFF')) }));
        const itemData = items.map(i => ({ x: i.gridX, y: i.gridY }));
        conn.send({
            type: 'sync',
            grid: grid.buffer, 
            p1: { x: p1.gridX, y: p1.gridY, ammo: p1.ammo, charging: p1.isCharging, hasPower: p1.hasPowerShot },
            p2: { x: p2.gridX, y: p2.gridY, ammo: p2.ammo, charging: p2.isCharging, hasPower: p2.hasPowerShot },
            bullets: bulletData,
            items: itemData,
            countdown: currentCount,
            gameOver: gameOver,
            winner: winner
        });
    }

    requestAnimationFrame(loop);
}
</script>
